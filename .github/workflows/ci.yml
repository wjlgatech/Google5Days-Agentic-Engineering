name: gate
# Lengthen 10X: the 104-check gate + tests now run on EVERY push/PR — the bar
# enforces itself, not "when a human remembers to run it". No secrets needed:
# the gate is deterministic and the exercises are zero-dependency.
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest
      - name: make check (104 structural checks + pytest)
        run: make check
